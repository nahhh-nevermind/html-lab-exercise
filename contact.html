<!DOCTYPE html>
<html lang = "en">
<head>
	<link rel="stylesheet" href="style.css">
	<title>MY CONTACT</title>
	<meta charset = "UTF-8">
	<meta name = "description" content = "Contact Me">
</head>
<body>
	<header>
		<h1>CONTACT ME</h1>
	</header>
	<main>
		<form action="#" method=post>
			<fieldset>
				<legend>Your Contact:</legend>
				<label for = fname id="labelfname">First Name:</label>
				<input type="text" id=fname name=fname placeholder="First Name"><br><br>

				<label for = lname id="labellname">Last Name:</label>
				<input type="text" id=lname name=lname placeholder="Last Name" style=""><br><br>

				<label for = email id="labelemail">E-mail:</label>
				<input type="email" id=email name=email placeholder="E-Mail"><br><br>

				<label for = telNo id="labeltelNo">Telephone Number:</label>
				<input type="tel" id=telNo name=telNo placeholder="Tel Num."><br><br>

				<label for = date id="labeldate">Date to Contact You:</label>
				<input type="date" id=date name=date><br><br>

				
				
				<label for=contactinfo id="labelcontact">Other ways to contact me:</label><br>
					<input type = "checkbox" id="instagram" name="contactinfo" value="instagram">
					<label for="instagram">Instagram</label><br>

					<input type = "checkbox" id="LinkedIn" name="contactinfo" value="LinkedIn">
					<label for="LinkedIn">LinkedIn</label><br>

					<input type = "checkbox" id="Others" name="contactinfo" value="Others">
					<label for="Others">Others</label><br><br>

				<label for=role id="labelrole">I am a:</label><br>
					<input type="radio" id="employer" name="role" value="employer">
					<label for="employer">Employer</label><br>

					<input type="radio" id="friends" name="role" value="friends">
					<label for="friends">Students/Friends</label><br>

					<input type="radio" id="employer" name = "role" value="Client">
					<label for="client">Client</label><br><br>
				
				<label for = inquiriestype id="labelinquiries">What type of inquiries:</label>
				<select name = inquiriestype id = inquiriestype>
					<optgroup label = "More About Me">
						<option value = Background>Background</option>
						<option value = Experience>Experience</option>
						<option value = Others>Others</option>
					</optgroup>
					<optgroup label = "Project Inquiries">
						<option value = Collab>Collaboration</option>
						<option value = Commission>Commission</option>
						<option value = Others>Others</option>
				</select><br><br>

				<label for = message id="labelmessage">If you have any inquiries:</label>
				<input type="textarea" id=message name=message maxlength=400 placeholder="Fill in your message here(400 characters)"><br><br>

				<label for = urgent id="labelurgent">How urgent is your inquiries?</label>
				<input type = "number" id="urgent" name="urgent" placeholder="Type in from 1-10"><br><br>
				</fieldset>
				
				<input type="checkbox" id=privacy name=privacy_agreement>
				<label for = privacy id="labelprivacy">I hereby agree that the information I submitted are valid and given permission to be contacted by the provided information</label><br><br>

				<label for="satisfaction" id="labelsatisfaction">How satisfied are you with this contact information?</label><br>
				<input type="range" id="satisfaction" name = "satisfaction" min="1" max="10" step="1" value="6"><br><br>

				<button type="submit">Submit</button> 
	</main>
</body>
</html>
