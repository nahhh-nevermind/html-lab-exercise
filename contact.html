<!DOCTYPE html>
<html lang = "en">
<head>
	<link rel="stylesheet" href="style.css">
	<title>MY CONTACT</title>
	<meta charset = "UTF-8">
	<meta name = "description" content = "Contact Me">
</head>
<body>
	<header>
		<h2>CONTACT ME</h2>
	</header>
	<nav>
		<a href="about.html">ABOUT ME</a><br>
		<a href="academic.html">ACADEMICS</a><br>
		<a href="skills.html">SKILLS</a><br>
		<a href="projects.html">PROJECTS</a><br>
		<a href="contact.html">CONTACT ME</a><br>
	</nav>
	<main>
		<section>
			<h1>Your Contact:</h1>
		<form action="#" method="post">
			<fieldset>
				<legend>Contact Me:</legend>
				<label for = "fname">First Name:</label>
				<input type="text" id=fname name=fname placeholder="First Name" required><br><br>

				<label for = lname>Last Name:</label>
				<input type="text" id=lname name=lname placeholder="Last Name"><br><br>

				<label for = email>E-mail:</label>
				<input type="email" id=email name=email placeholder="E-Mail" required><br><br>

				<label for = telNo>Telephone Number:</label>
				<input type="tel" id=telNo name=telNo placeholder="Tel Num." required><br><br>

				<label for = "date">Date to Contact You:</label>
				<input type="date" id="date" name="date" required><br><br>

				
				
				<p>Other ways to contact me:</p><br>
					<input type = "checkbox" id="instagram" name="contactinfo" value="instagram">
					<label for="instagram">Instagram</label><br>

					<input type = "checkbox" id="LinkedIn" name="contactinfo" value="LinkedIn">
					<label for="LinkedIn">LinkedIn</label><br>

					<input type = "checkbox" id="Others" name="contactinfo" value="Others">
					<label for="Others">Others</label><br><br>

				<p>I am a:</p><br>
					<input type="radio" id="employerinput" name="role" value="employer">
					<label for="employerinput">Employer</label><br>

					<input type="radio" id="friends" name="role" value="friends">
					<label for="friends">Students/Friends</label><br>

					<input type="radio" id="client" name = "role" value="client">
					<label for="client">Client</label><br><br>
				
				<label for = inquiriestype>What type of inquiries:</label>
				<select name = inquiriestype id = inquiriestype>
					<optgroup label = "More About Me">
						<option value = "Background">Background</option>
						<option value = "Experience">Experience</option>
						<option value = "Others">Others</option>
					</optgroup>
					<optgroup label = "Project Inquiries">
						<option value = "Collab">Collaboration</option>
						<option value = "Commission">Commission</option>
						<option value = "Others">Others</option>
					</optgroup>
				</select><br><br>

				<label for = "message">If you have any inquiries:</label>
				<textarea id=message name=message maxlength=400 placeholder="Fill in your message here(400 characters)"></textarea><br><br>

				<label for = urgent>How urgent is your inquiries?</label>
				<input type = "number" id="urgent" name="urgent" placeholder="Type in from 1-10"><br><br>
				</fieldset>
				
				<input type="checkbox" id=privacy name=privacy_agreement>
				<label for = privacy>I hereby agree that the information I submitted are valid and given permission to be contacted by the provided information</label><br><br>

				<label for="satisfaction">How satisfied are you with this contact information?</label><br>
				<input type="range" id="satisfaction" name = "satisfaction" min="1" max="10" step="1" value="6"><br><br>

				<button type="submit">Submit</button>
		</form>
		</section>
	</main>
	<footer>
		<address>
			You can contact me by: <br>
			<a href = "mailto:jeremy.geafri05@gmail.com">E-mail</a><br>
			<a href = "tel:+601114723736">Phone No.</a>
		</address>
	</footer>

</body>
</html>
